# Build and deploy: backend to ECR + ECS, frontend to S3 + CloudFront
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: 'us-east-1'
  ECR_REPOSITORY: 'smart-gtm-agent-backend'
  ECS_CLUSTER: 'smart-gtm-agent-cluster'
  ECS_SERVICE: 'smart-gtm-agent-backend'

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      backend_url: ${{ steps.get-url.outputs.backend_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        # Alternative: static IAM keys via configure-aws-credentials (not recommended)

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Fargate is linux/amd64; build for that platform so it works from any runner (e.g. ARM)
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Get Backend URL (ALB)
        id: get-url
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --region $AWS_REGION --query "LoadBalancers[?contains(LoadBalancerName,'smart-gtm-agent')].DNSName" --output text)
          echo "backend_url=http://${ALB_DNS}" >> $GITHUB_OUTPUT

      - name: Deploy backend (ECS or EC2)
        run: |
          if [ "${{ vars.BACKEND_TYPE || 'ecs' }}" = "ec2" ]; then
            ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --region $AWS_REGION --query "AutoScalingGroups[?contains(AutoScalingGroupName,'smart-gtm-agent-backend')].AutoScalingGroupName" --output text)
            if [ -n "$ASG_NAME" ]; then
              aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME" --region $AWS_REGION
            fi
          else
            aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $AWS_REGION
          fi

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require deploy configuration
        run: |
          missing=""
          [ -z "${{ secrets.BACKEND_URL }}" ] && missing="BACKEND_URL "
          [ -z "${{ secrets.FRONTEND_BUCKET }}" ] && missing="${missing}FRONTEND_BUCKET "
          [ -z "${{ secrets.CLOUDFRONT_DIST_ID }}" ] && missing="${missing}CLOUDFRONT_DIST_ID "
          if [ -n "$missing" ]; then
            echo "::error::Add missing Actions encrypted variables: $missing (from terraform output)"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # BACKEND_URL in repo Actions vars = ALB URL (terraform output backend_url)
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
        run: npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        env:
          BUCKET: ${{ secrets.FRONTEND_BUCKET }}
        run: |
          aws s3 sync frontend/dist "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
